<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMonitor - Predictor Financiero IA</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #090d16;
      --card-bg: #0f172a;
      --border-color: #1e293b;
      --accent-blue: #2563eb;
      --accent-cyan: #38bdf8;
      --accent-red: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      padding: 15px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dashboard-container {
      width: 100%;
      max-width: 1280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 1.1em;
      letter-spacing: 1px;
      color: var(--text-main);
      margin: 0;
      text-transform: uppercase;
      font-weight: 800;
    }
    .header p {
      font-size: 0.75em;
      color: var(--text-muted);
      margin: 2px 0 0 0;
    }

    /* Layout 50% Izquierda - 50% Derecha */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; /* Exactamente 50% y 50% */
      gap: 12px;
      align-items: stretch;
    }

    .left-column, .right-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Tarjetas Dark Glass */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    label {
      font-size: 0.7em;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }
    input {
      background: #020617;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: #fff;
      padding: 6px 10px;
      font-size: 0.85em;
      outline: none;
      width: 100%;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-weight: 700;
      font-size: 0.75em;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-sync {
      background: rgba(56, 189, 248, 0.1);
      color: var(--accent-cyan);
      border: 1px solid rgba(56, 189, 248, 0.3);
    }
    .btn-calc {
      background: linear-gradient(135deg, #0284c7, #2563eb);
      color: white;
      box-shadow: 0 0 10px rgba(37, 99, 235, 0.4);
    }

    .status-text {
      font-size: 0.65em;
      text-align: center;
      color: var(--text-muted);
    }

    .kpi-badge {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 12px;
    }
    .kpi-title {
      font-size: 0.65em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
    }
    .kpi-value {
      font-size: 1.1em;
      font-weight: 800;
    }
    .kpi-value.blue { color: var(--accent-cyan); text-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
    .kpi-value.red { color: var(--accent-red); text-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }

    .chart-box {
      height: 210px;
      position: relative;
    }

    .chart-title {
      font-size: 0.7em;
      color: var(--accent-cyan);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.7em;
    }
    th {
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      padding: 6px 2px;
      text-align: center;
      text-transform: uppercase;
    }
    td {
      padding: 6px 2px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .blue-text { color: var(--accent-cyan); font-weight: 700; }
    .red-text { color: var(--accent-red); font-weight: 700; }

    /* Adaptación para pantallas táctiles/celulares */
    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="dashboard-container">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>SmartMonitor <span style="color: var(--accent-cyan); font-weight: 300;">| IA Financiera</span></h1>
      <p>Inferencia en Borde • Proyección Semestral (6 Meses)</p>
    </div>
    <!-- KPI Resumen -->
    <div class="kpi-badge" id="kpiCard" style="display: none; min-width: 220px;">
      <div>
        <div class="kpi-title">Neto Semestre (6M)</div>
        <div id="kpiLabel" style="font-size: 0.65em; color: #cbd5e1;">--</div>
      </div>
      <div id="kpiValue" class="kpi-value blue">$0.00M</div>
    </div>
  </div>

  <!-- Layout Principal (50% Izquierda / 50% Derecha) -->
  <div class="main-grid">

    <!-- Columna Izquierda (Controles + Tabla) -->
    <div class="left-column">
      <div class="card controls">
        <button class="btn-sync" onclick="sincronizarPesos()">1. Sincronizar Modelo (API)</button>
        <div id="status" class="status-text">Estado: Esperando acción...</div>

        <div style="display: flex; flex-direction: column; gap: 2px; margin-top: 4px;">
          <label for="mesInicio">Mes Inicial</label>
          <input type="number" id="mesInicio" value="10" min="1">
        </div>

        <button class="btn-calc" onclick="calcularProyeccion()">2. Ejecutar Inferencia IA</button>
      </div>

      <!-- Tabla Detalle -->
      <div class="card" id="tablaCard" style="display: none; flex-grow: 1;">
        <div id="resultadoTabla"></div>
      </div>
    </div>

    <!-- Columna Derecha (Gráfico 1 Arriba, Gráfico 2 Abajo) -->
    <div class="right-column">
      <!-- Gráfico 1: Flujo Neto Mensual -->
      <div class="card chart-box" id="chartCard1" style="display: none;">
        <div class="chart-title">Flujo Neto Mensual</div>
        <div style="height: 170px;"><canvas id="flujoChart"></canvas></div>
      </div>

      <!-- Gráfico 2: Flujo vs Interés 3% Vtas -->
      <div class="card chart-box" id="chartCard2" style="display: none;">
        <div class="chart-title">Flujo vs Interés 3% Vtas</div>
        <div style="height: 170px;"><canvas id="comparativaChart"></canvas></div>
      </div>
    </div>

  </div>

</div>

<script>
  const API_URL = "https://api-pesos-modelo.onrender.com/api/v1/model-weights";
  let chartInstance1 = null;
  let chartInstance2 = null;

  async function sincronizarPesos() {
    const statusDiv = document.getElementById("status");
    statusDiv.style.color = "#38bdf8";
    statusDiv.innerText = "Conectando con microservicio...";

    try {
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error();
      const data = await response.json();
      localStorage.setItem("pesos_modelo", JSON.stringify(data.pesos));
      statusDiv.style.color = "#38bdf8";
      statusDiv.innerText = `Modelo listo: w=${data.pesos.w}, b=${data.pesos.b}`;
    } catch (e) {
      statusDiv.style.color = "#ef4444";
      statusDiv.innerText = "Error de sincronización.";
    }
  }

  function calcularProyeccion() {
    const mesInicio = parseInt(document.getElementById("mesInicio").value);
    const pesosGuardados = localStorage.getItem("pesos_modelo");

    if (!pesosGuardados || isNaN(mesInicio)) {
      alert("Por favor, sincronizá el modelo e ingresá un mes válido.");
      return;
    }

    const { w, b } = JSON.parse(pesosGuardados);
    
    const MARGEN_COMPRAS = 0.70;
    const GASTO_FIJO = 5.0;     
    const TASA_BANCO = 0.03;    

    let mesesLabels = [];
    let flujosData = [];
    let interesBancarioData = [];
    let totalFlujo = 0;

    let htmlTabla = `
      <table>
        <thead>
          <tr>
            <th>Mes</th>
            <th>Ventas</th>
            <th>Comp.</th>
            <th>Fijos</th>
            <th>Neto</th>
            <th>Banco</th>
          </tr>
        </thead>
        <tbody>
    `;

    for (let i = 0; i < 6; i++) {
      let m = mesInicio + i;
      let ventaIA = (w * m) + b;
      let compras = ventaIA * MARGEN_COMPRAS;
      let flujoNeto = ventaIA - compras - GASTO_FIJO;
      let interesBanco = ventaIA * TASA_BANCO;

      totalFlujo += flujoNeto;
      mesesLabels.push(`M${m}`);
      flujosData.push(parseFloat(flujoNeto.toFixed(2)));
      interesBancarioData.push(parseFloat(interesBanco.toFixed(2)));

      let clase = flujoNeto >= 0 ? "blue-text" : "red-text";

      htmlTabla += `
        <tr>
          <td><strong>M${m}</strong></td>
          <td>$${ventaIA.toFixed(1)}M</td>
          <td>-$${compras.toFixed(1)}M</td>
          <td>-$${GASTO_FIJO.toFixed(1)}M</td>
          <td class="${clase}">$${flujoNeto.toFixed(2)}M</td>
          <td style="color: #f97316;">$${interesBanco.toFixed(2)}M</td>
        </tr>
      `;
    }

    let claseTotal = totalFlujo >= 0 ? "blue-text" : "red-text";
    htmlTabla += `
        </tbody>
        <tfoot>
          <tr style="font-weight: bold; border-top: 1px solid #334155;">
            <td colspan="4" style="text-align: right; color: var(--text-muted);">TOTAL:</td>
            <td class="${claseTotal}">$${totalFlujo.toFixed(2)}M</td>
            <td>--</td>
          </tr>
        </tfoot>
      </table>
    `;

    document.getElementById("resultadoTabla").innerHTML = htmlTabla;

    // Mostrar Secciones
    document.getElementById("kpiCard").style.display = "flex";
    document.getElementById("chartCard1").style.display = "block";
    document.getElementById("chartCard2").style.display = "block";
    document.getElementById("tablaCard").style.display = "block";

    // KPI Header
    const kpiValue = document.getElementById("kpiValue");
    const kpiLabel = document.getElementById("kpiLabel");

    if (totalFlujo >= 0) {
      kpiValue.className = "kpi-value blue";
      kpiValue.innerText = `+$${totalFlujo.toFixed(2)}M`;
      kpiLabel.innerText = "Superávit Semestral";
    } else {
      kpiValue.className = "kpi-value red";
      kpiValue.innerText = `-$${Math.abs(totalFlujo).toFixed(2)}M`;
      kpiLabel.innerText = "Déficit Semestral";
    }

    renderizarGraficoFlujo(mesesLabels, flujosData);
    renderizarGraficoComparativo(mesesLabels, flujosData, interesBancarioData);
  }

  function renderizarGraficoFlujo(labels, data) {
    const ctx = document.getElementById('flujoChart').getContext('2d');
    if (chartInstance1) chartInstance1.destroy();

    const gradientBlue = ctx.createLinearGradient(0, 0, 0, 150);
    gradientBlue.addColorStop(0, 'rgba(56, 189, 248, 0.4)');
    gradientBlue.addColorStop(1, 'rgba(56, 189, 248, 0.0)');

    const gradientRed = ctx.createLinearGradient(0, 0, 0, 150);
    gradientRed.addColorStop(0, 'rgba(239, 68, 68, 0.4)');
    gradientRed.addColorStop(1, 'rgba(239, 68, 68, 0.0)');

    chartInstance1 = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Flujo Neto',
          data: data,
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: data.map(v => v >= 0 ? '#38bdf8' : '#ef4444'),
          borderColor: '#38bdf8',
          fill: {
            target: 'origin',
            above: gradientBlue,
            below: gradientRed
          }
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: { size: 9 } } },
          y: {
            grid: {
              color: (ctx) => ctx.tick.value === 0 ? '#38bdf8' : 'rgba(255,255,255,0.05)',
              lineWidth: (ctx) => ctx.tick.value === 0 ? 1.5 : 1
            },
            ticks: { color: '#94a3b8', font: { size: 9 }, callback: (v) => '$' + v + 'M' }
          }
        }
      }
    });
  }

  function renderizarGraficoComparativo(labels, flujoData, bancoData) {
    const ctx = document.getElementById('comparativaChart').getContext('2d');
    if (chartInstance2) chartInstance2.destroy();

    chartInstance2 = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Flujo IA',
            data: flujoData,
            borderColor: '#38bdf8',
            borderWidth: 2,
            tension: 0.3,
            pointRadius: 3,
            pointBackgroundColor: flujoData.map(v => v >= 0 ? '#38bdf8' : '#ef4444')
          },
          {
            label: 'Banco 3%',
            data: bancoData,
            borderColor: '#f97316',
            borderWidth: 2,
            borderDash: [4, 4],
            tension: 0.3,
            pointRadius: 3,
            pointBackgroundColor: '#f97316'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            labels: { color: '#94a3b8', font: { size: 9 }, boxWidth: 10 }
          }
        },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: { size: 9 } } },
          y: {
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: { color: '#94a3b8', font: { size: 9 }, callback: (v) => '$' + v + 'M' }
          }
        }
      }
    });
  }
</script>

</body>
</html>
