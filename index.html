<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Financiero - Proyección de Flujo</title>
  <!-- Chart.js para gráficos financieros -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #1e293b;
      --accent: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
      --bg: #f8fafc;
    }

    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      padding: 15px; 
      background-color: var(--bg); 
      color: #334155; 
      margin: 0;
    }

    .container { 
      max-width: 480px; 
      margin: 0 auto; 
      background: white; 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
    }

    h2 { 
      color: var(--primary); 
      text-align: center; 
      margin-top: 0; 
      font-size: 1.25em; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    label { font-weight: 600; font-size: 0.85em; color: #64748b; display: block; margin-top: 10px; }
    input { 
      width: 100%; 
      padding: 10px; 
      margin-top: 4px; 
      box-sizing: border-box; 
      border: 1px solid #cbd5e1; 
      border-radius: 6px; 
      font-size: 1em;
    }

    button { 
      width: 100%; 
      padding: 12px; 
      margin-top: 10px; 
      border: none; 
      border-radius: 6px; 
      font-weight: 700; 
      cursor: pointer; 
      transition: all 0.2s ease;
    }

    .btn-sync { background-color: #f1f5f9; color: var(--primary); border: 1px solid #cbd5e1; }
    .btn-calc { background-color: var(--accent); color: white; }
    .btn-calc:hover { background-color: #1d4ed8; }

    .status { font-size: 0.8em; text-align: center; margin-top: 6px; font-weight: 600; }

    /* Alerta Financiera Principal */
    .alert-box {
      margin-top: 15px;
      padding: 12px 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      font-size: 0.95em;
      display: none;
    }
    .alert-danger { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .alert-success { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    /* Canvas del Gráfico */
    .chart-container {
      position: relative;
      margin-top: 15px;
      height: 220px;
    }

    /* Tabla Financiera */
    .results-table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 0.8em; }
    .results-table th, .results-table td { padding: 8px; text-align: center; border-bottom: 1px solid #e2e8f0; }
    .results-table th { background-color: var(--primary); color: white; font-weight: 600; }
    .total-row { font-weight: bold; background-color: #f1f5f9; }
    .positive { color: var(--success); }
    .negative { color: var(--danger); }
  </style>
</head>
<body>

<div class="container">
  <h2>🧮 Control de Flujo Neto</h2>

  <button class="btn-sync" onclick="sincronizarPesos()">1. Sincronizar Modelo (API)</button>
  <div id="status" class="status"></div>

  <label for="mesInicio">Mes Inicial de Proyección:</label>
  <input type="number" id="mesInicio" value="10" min="1">

  <button class="btn-calc" onclick="calcularProyeccion()">2. Generar Informe Financiero</button>

  <!-- Cartel de Alerta Financiera -->
  <div id="alertaBox" class="alert-box"></div>

  <!-- Contenedor del Gráfico de Flujo -->
  <div class="chart-container">
    <canvas id="flujoChart"></canvas>
  </div>

  <!-- Tabla Detallada -->
  <div id="resultadoTabla"></div>
</div>

<script>
  const API_URL = "https://api-pesos-modelo.onrender.com/api/v1/model-weights";
  let chartInstance = null; // Instancia global del gráfico

  async function sincronizarPesos() {
    const statusDiv = document.getElementById("status");
    statusDiv.style.color = "#d97706";
    statusDiv.innerText = "Consultando API en Render...";

    try {
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error();
      const data = await response.json();
      localStorage.setItem("pesos_modelo", JSON.stringify(data.pesos));
      statusDiv.style.color = "#059669";
      statusDiv.innerText = `Pesos listos: w=${data.pesos.w}, b=${data.pesos.b}`;
    } catch (e) {
      statusDiv.style.color = "#dc2626";
      statusDiv.innerText = "Error al conectar. Reintente en 30s.";
    }
  }

  function calcularProyeccion() {
    const mesInicio = parseInt(document.getElementById("mesInicio").value);
    const pesosGuardados = localStorage.getItem("pesos_modelo");

    if (!pesosGuardados || isNaN(mesInicio)) {
      alert("Por favor, sincronizá los pesos e ingresá un mes válido.");
      return;
    }

    const { w, b } = JSON.parse(pesosGuardados);

    // Parámetros Financieros
    const MARGEN_COMPRAS = 0.75;
    const GASTO_FIJO = 6.0;

    let mesesLabels = [];
    let flujosData = [];
    let totalFlujo = 0;

    let htmlTabla = `
      <table class="results-table">
        <thead>
          <tr>
            <th>Mes</th>
            <th>Ventas (IA)</th>
            <th>Compras</th>
            <th>Fijos</th>
            <th>Neto</th>
          </tr>
        </thead>
        <tbody>
    `;

    for (let i = 0; i < 3; i++) {
      let m = mesInicio + i;
      let ventaIA = (w * m) + b;
      let compras = ventaIA * MARGEN_COMPRAS;
      let flujoNeto = ventaIA - compras - GASTO_FIJO;

      totalFlujo += flujoNeto;
      mesesLabels.push(`Mes ${m}`);
      flujosData.push(parseFloat(flujoNeto.toFixed(2)));

      let clase = flujoNeto >= 0 ? "positive" : "negative";

      htmlTabla += `
        <tr>
          <td><strong>Mes ${m}</strong></td>
          <td>$${ventaIA.toFixed(2)}M</td>
          <td>-$${compras.toFixed(2)}M</td>
          <td>-$${GASTO_FIJO.toFixed(2)}M</td>
          <td class="${clase}"><strong>$${flujoNeto.toFixed(2)}M</strong></td>
        </tr>
      `;
    }

    let claseTotal = totalFlujo >= 0 ? "positive" : "negative";
    htmlTabla += `
        </tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="4">Neto Acumulado Trimestre:</td>
            <td class="${claseTotal}">$${totalFlujo.toFixed(2)}M</td>
          </tr>
        </tfoot>
      </table>
    `;

    document.getElementById("resultadoTabla").innerHTML = htmlTabla;

    // Renderizado del Cartel de Alerta Financiera
    const alertaDiv = document.getElementById("alertaBox");
    alertaDiv.style.display = "block";

    if (totalFlujo < 0) {
      alertaDiv.className = "alert-box alert-danger";
      alertaDiv.innerHTML = `🚨 <strong>ALERTA DE LIQUIDEZ</strong><br>Déficit trimestral estimado de <strong>$${Math.abs(totalFlujo).toFixed(2)} Millones</strong>.`;
    } else {
      alertaDiv.className = "alert-box alert-success";
      alertaDiv.innerHTML = `✅ <strong>ESTRUCTURA SALUDABLE</strong><br>Superávit trimestral estimado de <strong>$${totalFlujo.toFixed(2)} Millones</strong>.`;
    }

    // Dibujar o actualizar el Gráfico de Áreas
    renderizarGrafico(mesesLabels, flujosData);
  }

  function renderizarGrafico(labels, data) {
    const ctx = document.getElementById('flujoChart').getContext('2d');

    // Destruir gráfico anterior si existe
    if (chartInstance) {
      chartInstance.destroy();
    }

    // Configuración de colores degradados dinámicos arriba/abajo de cero
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Flujo Neto ($M)',
          data: data,
          borderWidth: 3,
          tension: 0.3, // Curvatura suave
          pointRadius: 6,
          pointBackgroundColor: data.map(v => v >= 0 ? '#10b981' : '#ef4444'),
          borderColor: '#1e293b',
          fill: {
            target: 'origin',
            above: 'rgba(16, 185, 129, 0.25)', // Color Verde/Azul para Superávit
            below: 'rgba(239, 68, 68, 0.3)'   // Color Rojo para Déficit
          }
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: {
            grid: {
              color: (context) => context.tick.value === 0 ? '#1e293b' : '#f1f5f9',
              lineWidth: (context) => context.tick.value === 0 ? 2 : 1
            },
            ticks: {
              callback: function(value) { return '$' + value + 'M'; }
            }
          }
        }
      }
    });
  }
</script>

</body>
</html>
