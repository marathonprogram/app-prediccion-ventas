<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMonitor - Predictor Financiero IA</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #090d16;
      --card-bg: #0f172a;
      --border-color: #1e293b;
      --accent-cyan: #38bdf8;
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      padding: 15px;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .dashboard {
      width: 100%;
      max-width: 520px;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Encabezado Principal */
    .header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }
    .header h1 {
      font-size: 1.1em;
      letter-spacing: 1px;
      color: var(--text-main);
      margin: 0;
      text-transform: uppercase;
      font-weight: 800;
    }
    .header p {
      font-size: 0.75em;
      color: var(--text-muted);
      margin: 4px 0 0 0;
    }

    /* Tarjetas estilo Dark Glass */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    /* Botones y Controles */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-size: 0.75em;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }
    input {
      background: #020617;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: #fff;
      padding: 8px 12px;
      font-size: 0.9em;
      outline: none;
    }
    input:focus {
      border-color: var(--accent-cyan);
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-weight: 700;
      font-size: 0.8em;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-sync {
      background: rgba(56, 189, 248, 0.1);
      color: var(--accent-cyan);
      border: 1px solid rgba(56, 189, 248, 0.3);
    }
    .btn-calc {
      background: linear-gradient(135deg, #0284c7, #2563eb);
      color: white;
      box-shadow: 0 0 10px rgba(37, 99, 235, 0.4);
    }

    .status-text {
      font-size: 0.7em;
      text-align: center;
      color: var(--text-muted);
    }

    /* KPI / Badge de Alerta en Encabezado */
    .kpi-badge {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px 15px;
    }
    .kpi-title {
      font-size: 0.7em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
    }
    .kpi-value {
      font-size: 1.2em;
      font-weight: 800;
    }
    .kpi-value.green { color: var(--accent-green); text-shadow: 0 0 8px rgba(34, 197, 94, 0.3); }
    .kpi-value.red { color: var(--accent-red); text-shadow: 0 0 8px rgba(239, 68, 68, 0.3); }

    /* Gráfico */
    .chart-box {
      height: 200px;
      position: relative;
    }

    /* Tabla Neon */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75em;
      margin-top: 5px;
    }
    th {
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      padding: 6px;
      text-align: center;
      text-transform: uppercase;
    }
    td {
      padding: 8px 4px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .green-text { color: var(--accent-green); font-weight: 700; }
    .red-text { color: var(--accent-red); font-weight: 700; }
  </style>
</head>
<body>

<div class="dashboard">

  <!-- Header Estilo SmartMonitor -->
  <div class="header">
    <h1>SmartMonitor <span style="color: var(--accent-cyan); font-weight: 300;">| IA Financiera</span></h1>
    <p>Inferencia en Borde • Predicción de Flujo Neto Trimestral</p>
  </div>

  <!-- Controles -->
  <div class="card controls">
    <button class="btn-sync" onclick="sincronizarPesos()">1. Sincronizar Modelo (API)</button>
    <div id="status" class="status-text">Estado: Esperando acción...</div>

    <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 4px;">
      <label for="mesInicio">Mes de Inicio Trimestre</label>
      <input type="number" id="mesInicio" value="10" min="1">
    </div>

    <button class="btn-calc" onclick="calcularProyeccion()">2. Ejecutar Inferencia IA</button>
  </div>

  <!-- KPI Resumen (Métrica de Impacto) -->
  <div class="kpi-badge" id="kpiCard" style="display: none;">
    <div>
      <div class="kpi-title">Proyección Neto Trimestral</div>
      <div id="kpiLabel" style="font-size: 0.75em; color: #cbd5e1; margin-top: 2px;">--</div>
    </div>
    <div id="kpiValue" class="kpi-value green">$0.00M</div>
  </div>

  <!-- Contenedor del Gráfico -->
  <div class="card chart-box" id="chartCard" style="display: none;">
    <canvas id="flujoChart"></canvas>
  </div>

  <!-- Tabla Detalle -->
  <div class="card" id="tablaCard" style="display: none;">
    <div id="resultadoTabla"></div>
  </div>

</div>

<script>
  const API_URL = "https://api-pesos-modelo.onrender.com/api/v1/model-weights";
  let chartInstance = null;

  async function sincronizarPesos() {
    const statusDiv = document.getElementById("status");
    statusDiv.style.color = varColor('--accent-cyan');
    statusDiv.innerText = "Conectando con microservicio...";

    try {
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error();
      const data = await response.json();
      localStorage.setItem("pesos_modelo", JSON.stringify(data.pesos));
      statusDiv.style.color = varColor('--accent-green');
      statusDiv.innerText = `Modelo sincronizado: w=${data.pesos.w}, b=${data.pesos.b}`;
    } catch (e) {
      statusDiv.style.color = varColor('--accent-red');
      statusDiv.innerText = "Error de sincronización con Render.";
    }
  }

  function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function calcularProyeccion() {
    const mesInicio = parseInt(document.getElementById("mesInicio").value);
    const pesosGuardados = localStorage.getItem("pesos_modelo");

    if (!pesosGuardados || isNaN(mesInicio)) {
      alert("Por favor, sincronizá el modelo e ingresá un mes válido.");
      return;
    }

    const { w, b } = JSON.parse(pesosGuardados);
    const MARGEN_COMPRAS = 0.70;
    const GASTO_FIJO = 5.5.0;

    let mesesLabels = [];
    let flujosData = [];
    let totalFlujo = 0;

    let htmlTabla = `
      <table>
        <thead>
          <tr>
            <th>Mes</th>
            <th>Ventas (IA)</th>
            <th>Compras</th>
            <th>Fijos</th>
            <th>Neto</th>
          </tr>
        </thead>
        <tbody>
    `;

    for (let i = 0; i < 4; i++) {
      let m = mesInicio + i;
      let ventaIA = (w * m) + b;
      let compras = ventaIA * MARGEN_COMPRAS;
      let flujoNeto = ventaIA - compras - GASTO_FIJO;

      totalFlujo += flujoNeto;
      mesesLabels.push(`Mes ${m}`);
      flujosData.push(parseFloat(flujoNeto.toFixed(2)));

      let clase = flujoNeto >= 0 ? "green-text" : "red-text";

      htmlTabla += `
        <tr>
          <td><strong>M${m}</strong></td>
          <td>$${ventaIA.toFixed(2)}M</td>
          <td>-$${compras.toFixed(2)}M</td>
          <td>-$${GASTO_FIJO.toFixed(2)}M</td>
          <td class="${clase}">$${flujoNeto.toFixed(2)}M</td>
        </tr>
      `;
    }

    let claseTotal = totalFlujo >= 0 ? "green-text" : "red-text";
    htmlTabla += `
        </tbody>
        <tfoot>
          <tr style="font-weight: bold; border-top: 1px solid #334155;">
            <td colspan="4" style="text-align: right; padding-right: 10px; color: var(--text-muted);">NETO ACUMULADO:</td>
            <td class="${claseTotal}">$${totalFlujo.toFixed(2)}M</td>
          </tr>
        </tfoot>
      </table>
    `;

    document.getElementById("resultadoTabla").innerHTML = htmlTabla;

    // Mostrar Secciones
    document.getElementById("kpiCard").style.display = "flex";
    document.getElementById("chartCard").style.display = "block";
    document.getElementById("tablaCard").style.display = "block";

    // KPI Header
    const kpiValue = document.getElementById("kpiValue");
    const kpiLabel = document.getElementById("kpiLabel");

    if (totalFlujo >= 0) {
      kpiValue.className = "kpi-value green";
      kpiValue.innerText = `+$${totalFlujo.toFixed(2)}M`;
      kpiLabel.innerText = "Estructura Saludable (Superávit)";
    } else {
      kpiValue.className = "kpi-value red";
      kpiValue.innerText = `-$${Math.abs(totalFlujo).toFixed(2)}M`;
      kpiLabel.innerText = "Riesgo de Liquidez (Déficit)";
    }

    renderizarGrafico(mesesLabels, flujosData);
  }

  function renderizarGrafico(labels, data) {
    const ctx = document.getElementById('flujoChart').getContext('2d');

    if (chartInstance) chartInstance.destroy();

    // Degradados oscuros estilo dashboard
    const gradientGreen = ctx.createLinearGradient(0, 0, 0, 200);
    gradientGreen.addColorStop(0, 'rgba(34, 197, 94, 0.4)');
    gradientGreen.addColorStop(1, 'rgba(34, 197, 94, 0.0)');

    const gradientRed = ctx.createLinearGradient(0, 0, 0, 200);
    gradientRed.addColorStop(0, 'rgba(239, 68, 68, 0.4)');
    gradientRed.addColorStop(1, 'rgba(239, 68, 68, 0.0)');

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Flujo Neto',
          data: data,
          borderWidth: 2,
          tension: 0.4,
          pointRadius: 5,
          pointBackgroundColor: data.map(v => v >= 0 ? '#22c55e' : '#ef4444'),
          borderColor: '#38bdf8',
          fill: {
            target: 'origin',
            above: gradientGreen,
            below: gradientRed
          }
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: { color: '#94a3b8', font: { size: 10 } }
          },
          y: {
            grid: {
              color: (ctx) => ctx.tick.value === 0 ? '#38bdf8' : 'rgba(255,255,255,0.05)',
              lineWidth: (ctx) => ctx.tick.value === 0 ? 1.5 : 1
            },
            ticks: {
              color: '#94a3b8',
              font: { size: 10 },
              callback: (val) => '$' + val + 'M'
            }
          }
        }
      }
    });
  }
</script>

</body>
</html>
