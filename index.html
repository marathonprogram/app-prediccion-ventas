<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyección de Flujo de Caja Trimestral</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 15px; background: #f4f6f9; color: #333; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 420px; margin: 0 auto; }
    h2 { color: #2c3e50; text-align: center; margin-top: 0; font-size: 1.3em; }
    label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.9em; }
    input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
    button { width: 100%; padding: 12px; margin-top: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .btn-sync { background-color: #3498db; color: white; }
    .btn-calc { background-color: #2ecc71; color: white; }
    .status { font-size: 0.85em; color: #27ae60; margin-top: 8px; text-align: center; font-weight: bold; }
    
    /* Tabla de resultados */
    .results-table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 0.85em; }
    .results-table th, .results-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    .results-table th { background-color: #2c3e50; color: white; }
    .total-row { font-weight: bold; background-color: #e8f8f5; }
    .positive { color: #27ae60; }
    .negative { color: #c0392b; }
  </style>
</head>
<body>

<div class="card">
  <h2>Proyección Financiera Trimestral</h2>

  <button class="btn-sync" onclick="sincronizarPesos()">1. Sincronizar Pesos (API / Render)</button>
  <div id="status" class="status"></div>

  <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">

  <label for="mesInicio">Mes de Inicio del Trimestre (ej: 10):</label>
  <input type="number" id="mesInicio" value="10" min="1">

  <button class="btn-calc" onclick="calcularTrimestre()">2. Predecir Flujo Trimestral (Offline)</button>

  <div id="resultado"></div>
</div>

<script>
  // URL de la API pública en Render
  const API_URL = "https://api-pesos-modelo.onrender.com/api/v1/model-weights";

  async function sincronizarPesos() {
    const statusDiv = document.getElementById("status");
    statusDiv.style.color = "#d35400";
    statusDiv.innerText = "Conectando a la API...";

    try {
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error("Error en la respuesta");
      const data = await response.json();

      // Guardar pesos devueltos por el backend
      localStorage.setItem("pesos_modelo", JSON.stringify(data.pesos));

      statusDiv.style.color = "#27ae60";
      statusDiv.innerText = `Pesos actualizados: w = ${data.pesos.w}, b = ${data.pesos.b}`;
    } catch (error) {
      statusDiv.style.color = "#c0392b";
      statusDiv.innerText = "Error de conexión. Reintente en 30s.";
    }
  }

  function calcularTrimestre() {
    const mesInicio = parseInt(document.getElementById("mesInicio").value);
    const resultadoDiv = document.getElementById("resultado");
    const pesosGuardados = localStorage.getItem("pesos_modelo");

    if (!pesosGuardados || isNaN(mesInicio)) {
      alert("Por favor, sincronizá los pesos primero e ingresá un mes válido.");
      return;
    }

    const { w, b } = JSON.parse(pesosGuardados);

    // Parámetros Financieros (Reglas de Negocio)
    const MARGEN_COMPRAS = 0.70; // -50% ventas
    const GASTO_FIJO = 4.0;       // $2 Millones fijos por mes

    let htmlTabla = `
      <table class="results-table">
        <thead>
          <tr>
            <th>Mes</th>
            <th>Venta (IA)</th>
            <th>Compras (50%)</th>
            <th>Fijos</th>
            <th>Flujo Neto</th>
          </tr>
        </thead>
        <tbody>
    `;

    let totalFlujo = 0;

    // Bucle para procesar el trimestre (3 meses consecutivos)
    for (let i = 0; i < 3; i++) {
      let m = mesInicio + i;

      // 1. INFERENCIA DE IA (Modelo MML)
      let ventaIA = (w * m) + b;

      // 2. LÓGICA FINANCIERA
      let compras = ventaIA * MARGEN_COMPRAS;
      let flujoNeto = ventaIA - compras - GASTO_FIJO;
      totalFlujo += flujoNeto;

      let claseColor = flujoNeto >= 0 ? "positive" : "negative";

      htmlTabla += `
        <tr>
          <td><strong>Mes ${m}</strong></td>
          <td>$${ventaIA.toFixed(2)}M</td>
          <td>-$${compras.toFixed(2)}M</td>
          <td>-$${GASTO_FIJO.toFixed(2)}M</td>
          <td class="${claseColor}"><strong>$${flujoNeto.toFixed(2)}M</strong></td>
        </tr>
      `;
    }

    let claseTotal = totalFlujo >= 0 ? "positive" : "negative";

    htmlTabla += `
        </tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="4">Flujo Neto Acumulado:</td>
            <td class="${claseTotal}">$${totalFlujo.toFixed(2)}M</td>
          </tr>
        </tfoot>
      </table>
    `;

    resultadoDiv.innerHTML = htmlTabla;
    resultadoDiv.scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
