<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predicción de Ventas - Edge AI</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f6f9; color: #333; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
    h2 { color: #2c3e50; text-align: center; margin-bottom: 5px; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
    button { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .btn-sync { background-color: #3498db; color: white; }
    .btn-calc { background-color: #2ecc71; color: white; }
    .result { margin-top: 20px; padding: 15px; background: #e8f8f5; border-left: 5px solid #2ecc71; font-size: 1.1em; }
    .status { font-size: 0.85em; color: #7f8c8d; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Predicción de Ventas</h2>
    <p style="text-align: center; font-size: 0.9em; color: #666;">Inferencia Local / On-Device</p>
    
    <!-- 1. Sincronización -->
    <button class="btn-sync" onclick="sincronizarPesos()">1. Sincronizar Pesos (API / Colab)</button>
    <div id="status" class="status">Estado: No sincronizado</div>

    <hr style="margin: 20px 0; border: 0.5px solid #eee;">

    <!-- 2. Inferencia Local (Offline) -->
    <label for="mes">Número de Mes a Proyectar (ej: 13):</label>
    <input type="number" id="mes" placeholder="Ej: 13" value="13">

    <button class="btn-calc" onclick="calcularPrediccion()">2. Predecir Venta (Offline)</button>

    <div id="resultado" class="result" style="display: none;"></div>
  </div>

  <script>
    const API_URL = "https://fluffy-ants-dress.loca.lt/api/v1/model-weights";// Tu API de Localtunnel
    
    

    async function sincronizarPesos() {
      const statusDiv = document.getElementById("status");
      statusDiv.innerText = "Conectando al servidor...";

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        // Guardamos w y b en la memoria interna del navegador (localStorage)
        localStorage.setItem("pesos_modelo", JSON.stringify(data.pesos));
        
        statusDiv.innerText = `Pesos actualizados: w = ${data.pesos.w}, b = ${data.pesos.b}`;
        statusDiv.style.color = "#27ae60";
      } catch (err) {
        statusDiv.innerText = "Error de conexión. Se usarán los pesos guardados en memoria.";
        statusDiv.style.color = "#e74c3c";
      }
    }

    function calcularPrediccion() {
      const mes = parseFloat(document.getElementById("mes").value);
      const resultadoDiv = document.getElementById("resultado");

      const pesosGuardados = localStorage.getItem("pesos_modelo");

      if (!pesosGuardados) {
        alert("Por favor, tocá '1. Sincronizar Pesos' primero para descargar el modelo.");
        return;
      }

      const { w, b } = JSON.parse(pesosGuardados);

      // Inferencia On-Device: Y = (w * X) + b
      const ventaPredicha = (w * mes) + b;

      resultadoDiv.style.display = "block";
      resultadoDiv.innerHTML = `
        <strong>Resultado de la Inferencia:</strong><br>
        Venta estimada Mes ${mes}: <strong>$${ventaPredicha.toFixed(2)} mil</strong><br>
        <small style="color:#555;">Fórmula local: (${w} * ${mes}) + ${b}</small>
      `;
    }
  </script>

</body>
</html>
