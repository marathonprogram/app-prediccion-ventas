<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMonitor - Predictor Financiero IA</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #090d16;
      --card-bg: #0f172a;
      --border-color: #1e293b;
      --accent-blue: #2563eb;
      --accent-cyan: #38bdf8;
      --accent-red: #ef4444;
      --accent-orange: #f97316;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      padding: 15px;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .dashboard {
      width: 100%;
      max-width: 520px;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }
    .header h1 {
      font-size: 1.1em;
      letter-spacing: 1px;
      color: var(--text-main);
      margin: 0;
      text-transform: uppercase;
      font-weight: 800;
    }
    .header p {
      font-size: 0.75em;
      color: var(--text-muted);
      margin: 4px 0 0 0;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-size: 0.75em;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }
    input {
      background: #020617;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: #fff;
      padding: 8px 12px;
      font-size: 0.9em;
      outline: none;
    }
    input:focus { border-color: var(--accent-cyan); }

    button {
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-weight: 700;
      font-size: 0.8em;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-sync {
      background: rgba(56, 189, 248, 0.1);
      color: var(--accent-cyan);
      border: 1px solid rgba(56, 189, 248, 0.3);
    }
    .btn-calc {
      background: linear-gradient(135deg, #0284c7, #2563eb);
      color: white;
      box-shadow: 0 0 10px rgba(37, 99, 235, 0.4);
    }

    .status-text {
      font-size: 0.7em;
      text-align: center;
      color: var(--text-muted);
    }

    .kpi-badge {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px 15px;
    }
    .kpi-title {
      font-size: 0.7em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
    }
    .kpi-value {
      font-size: 1.2em;
      font-weight: 800;
    }
    .kpi-value.blue { color: var(--accent-cyan); text-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
    .kpi-value.red { color: var(--accent-red); text-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }

    .chart-box {
      height: 200px;
      position: relative;
    }

    .chart-title {
      font-size: 0.75em;
      color: var(--accent-cyan);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.72em;
      margin-top: 5px;
    }
    th {
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      padding: 6px 2px;
      text-align: center;
      text-transform: uppercase;
    }
    td {
      padding: 8px 2px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .blue-text { color: var(--accent-cyan); font-weight: 700; }
    .red-text { color: var(--accent-red); font-weight: 700; }
  </style>
</head>
<body>

<div class="dashboard">

  <div class="header">
    <h1>SmartMonitor <span style="color: var(--accent-cyan); font-weight: 300;">| IA Financiera</span></h1>
    <p>Inferencia en Borde • Proyección Semestral (6 Meses)</p>
  </div>

  <div class="card controls">
    <button class="btn-sync" onclick="sincronizarPesos()">1. Sincronizar Modelo (API)</button>
    <div id="status" class="status-text">Estado: Esperando acción...</div>

    <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 4px;">
      <label for="mesInicio">Mes de Inicio Semestre</label>
      <input type="number" id="mesInicio" value="10" min="1">
    </div>

    <button class="btn-calc" onclick="calcularProyeccion()">2. Ejecutar Inferencia IA</button>
  </div>

  <!-- KPI Resumen Semestral -->
  <div class="kpi-badge" id="kpiCard" style="display: none;">
    <div>
      <div class="kpi-title">Neto Acumulado Semestre (6M)</div>
      <div id="kpiLabel" style="font-size: 0.75em; color: #cbd5e1; margin-top: 2px;">--</div>
    </div>
    <div id="kpiValue" class="kpi-value blue">$0.00M</div>
  </div>

  <!-- Gráfico 1: Área de Flujo Neto -->
  <div class="card chart-box" id="chartCard1" style="display: none;">
    <div class="chart-title">Evolución de Flujo Neto Mensual</div>
    <div style="height: 170px;"><canvas id="flujoChart"></canvas></div>
  </div>

  <!-- Gráfico 2: Comparativa vs Interés Bancario 3% -->
  <div class="card chart-box" id="chartCard2" style="display: none;">
    <div class="chart-title">Comparativa: Flujo Operativo vs Interés 3% Vtas</div>
    <div style="height: 170px;"><canvas id="comparativaChart"></canvas></div>
  </div>

  <!-- Tabla Detalle -->
  <div class="card" id="tablaCard" style="display: none;">
    <div id="resultadoTabla"></div>
  </div>

</div>

<script>
  const API_URL = "https://api-pesos-modelo.onrender.com/api/v1/model-weights";
  let chartInstance1 = null;
  let chartInstance2 = null;

  async function sincronizarPesos() {
    const statusDiv = document.getElementById("status");
    statusDiv.style.color = "#38bdf8";
    statusDiv.innerText = "Conectando con microservicio...";

    try {
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error();
      const data = await response.json();
      localStorage.setItem("pesos_modelo", JSON.stringify(data.pesos));
      statusDiv.style.color = "#38bdf8";
      statusDiv.innerText = `Modelo sincronizado: w=${data.pesos.w}, b=${data.pesos.b}`;
    } catch (e) {
      statusDiv.style.color = "#ef4444";
      statusDiv.innerText = "Error de sincronización con Render.";
    }
  }

  function calcularProyeccion() {
    const mesInicio = parseInt(document.getElementById("mesInicio").value);
    const pesosGuardados = localStorage.getItem("pesos_modelo");

    if (!pesosGuardados || isNaN(mesInicio)) {
      alert("Por favor, sincronizá el modelo e ingresá un mes válido.");
      return;
    }

    const { w, b } = JSON.parse(pesosGuardados);
    
    // NUEVOS PARÁMETROS SOLICITADOS
    const MARGEN_COMPRAS = 0.70; // 70% Compras
    const GASTO_FIJO = 5.0;      // $5M Fijos
    const TASA_BANCO = 0.03;     // 3% Interés Bancario

    let mesesLabels = [];
    let flujosData = [];
    let interesBancarioData = [];
    let totalFlujo = 0;

    let htmlTabla = `
      <table>
        <thead>
          <tr>
            <th>Mes</th>
            <th>Ventas</th>
            <th>Comp.(70%)</th>
            <th>Fijos</th>
            <th>Neto</th>
            <th>Banco(3%)</th>
          </tr>
        </thead>
        <tbody>
    `;

    // PROYECCIÓN A 6 MESES (SEMESTRE)
    for (let i = 0; i < 6; i++) {
      let m = mesInicio + i;
      let ventaIA = (w * m) + b;
      let compras = ventaIA * MARGEN_COMPRAS;
      let flujoNeto = ventaIA - compras - GASTO_FIJO;
      let interesBanco = ventaIA * TASA_BANCO;

      totalFlujo += flujoNeto;
      mesesLabels.push(`M${m}`);
      flujosData.push(parseFloat(flujoNeto.toFixed(2)));
      interesBancarioData.push(parseFloat(interesBanco.toFixed(2)));

      let clase = flujoNeto >= 0 ? "blue-text" : "red-text";

      htmlTabla += `
        <tr>
          <td><strong>M${m}</strong></td>
          <td>$${ventaIA.toFixed(1)}M</td>
          <td>-$${compras.toFixed(1)}M</td>
          <td>-$${GASTO_FIJO.toFixed(1)}M</td>
          <td class="${clase}">$${flujoNeto.toFixed(2)}M</td>
          <td style="color: #f97316;">$${interesBanco.toFixed(2)}M</td>
        </tr>
      `;
    }

    let claseTotal = totalFlujo >= 0 ? "blue-text" : "red-text";
    htmlTabla += `
        </tbody>
        <tfoot>
          <tr style="font-weight: bold; border-top: 1px solid #334155;">
            <td colspan="4" style="text-align: right; color: var(--text-muted);">NETO SEMESTRE:</td>
            <td class="${claseTotal}">$${totalFlujo.toFixed(2)}M</td>
            <td>--</td>
          </tr>
        </tfoot>
      </table>
    `;

    document.getElementById("resultadoTabla").innerHTML = htmlTabla;

    // Mostrar tarjetas
    document.getElementById("kpiCard").style.display = "flex";
    document.getElementById("chartCard1").style.display = "block";
    document.getElementById("chartCard2").style.display = "block";
    document.getElementById("tablaCard").style.display = "block";

    // KPI Header (Azul si es > 0, Rojo si es < 0)
    const kpiValue = document.getElementById("kpiValue");
    const kpiLabel = document.getElementById("kpiLabel");

    if (totalFlujo >= 0) {
      kpiValue.className = "kpi-value blue";
      kpiValue.innerText = `+$${totalFlujo.toFixed(2)}M`;
      kpiLabel.innerText = "Estructura Saludable (Superávit)";
    } else {
      kpiValue.className = "kpi-value red";
      kpiValue.innerText = `-$${Math.abs(totalFlujo).toFixed(2)}M`;
      kpiLabel.innerText = "Déficit Semestral Proyectado";
    }

    renderizarGraficoFlujo(mesesLabels, flujosData);
    renderizarGraficoComparativo(mesesLabels, flujosData, interesBancarioData);
  }

  // Gráfico 1: Área Azul / Roja
  function renderizarGraficoFlujo(labels, data) {
    const ctx = document.getElementById('flujoChart').getContext('2d');
    if (chartInstance1) chartInstance1.destroy();

    const gradientBlue = ctx.createLinearGradient(0, 0, 0, 180);
    gradientBlue.addColorStop(0, 'rgba(56, 189, 248, 0.4)');
    gradientBlue.addColorStop(1, 'rgba(56, 189, 248, 0.0)');

    const gradientRed = ctx.createLinearGradient(0, 0, 0, 180);
    gradientRed.addColorStop(0, 'rgba(239, 68, 68, 0.4)');
    gradientRed.addColorStop(1, 'rgba(239, 68, 68, 0.0)');

    chartInstance1 = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Flujo Neto',
          data: data,
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: data.map(v => v >= 0 ? '#38bdf8' : '#ef4444'),
          borderColor: '#38bdf8',
          fill: {
            target: 'origin',
            above: gradientBlue, // Azul arriba de cero
            below: gradientRed   // Rojo abajo de cero
          }
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: { size: 9 } } },
          y: {
            grid: {
              color: (ctx) => ctx.tick.value === 0 ? '#38bdf8' : 'rgba(255,255,255,0.05)',
              lineWidth: (ctx) => ctx.tick.value === 0 ? 1.5 : 1
            },
            ticks: { color: '#94a3b8', font: { size: 9 }, callback: (v) => '$' + v + 'M' }
          }
        }
      }
    });
  }

  // Gráfico 2: Comparativa Flujo Neto vs Rendimiento 3%
  function renderizarGraficoComparativo(labels, flujoData, bancoData) {
    const ctx = document.getElementById('comparativaChart').getContext('2d');
    if (chartInstance2) chartInstance2.destroy();

    chartInstance2 = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Flujo Neto (IA)',
            data: flujoData,
            borderColor: '#38bdf8', // Azul
            borderWidth: 2,
            tension: 0.3,
            pointRadius: 4,
            pointBackgroundColor: flujoData.map(v => v >= 0 ? '#38bdf8' : '#ef4444')
          },
          {
            label: 'Interés 3% Vtas',
            data: bancoData,
            borderColor: '#f97316', // Naranja/Línea de comparación
            borderWidth: 2,
            borderDash: [5, 5],    // Línea punteada
            tension: 0.3,
            pointRadius: 3,
            pointBackgroundColor: '#f97316'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            labels: { color: '#94a3b8', font: { size: 9 }, boxWidth: 12 }
          }
        },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: { size: 9 } } },
          y: {
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: { color: '#94a3b8', font: { size: 9 }, callback: (v) => '$' + v + 'M' }
          }
        }
      }
    });
  }
</script>

</body>
</html>
